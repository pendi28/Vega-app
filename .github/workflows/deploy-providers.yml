name: Deploy Providers ke GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20" # Pakai versi 20 yang lebih stabil

      - name: Install Dependencies
        run: |
          npm install # Biarkan dia instal semua sesuai package.json
          npm install esbuild terser # Pastikan esbuild benar-benar ada

      - name: Build Providers
        run: npm run providers:build # Gunakan script resmi dari package.json

      - name: Generate modflix.json
        run: |
          node -e "
          const fs = require('fs');
          if (!fs.existsSync('dist')) fs.mkdirSync('dist');
          const manifest = JSON.parse(fs.readFileSync('manifest.json', 'utf8'));
          const REPO = '${{ github.repository }}';
          const [owner, repo] = REPO.split('/');
          const BASE = 'https://' + owner.toLowerCase() + '.github.io/' + repo;
          const modflix = {};
          manifest.forEach(p => {
            modflix[p.value] = {
              url: BASE + '/' + p.value + '.js',
              version: p.version,
              display_name: p.display_name,
              type: p.type || 'global'
            };
          });
          fs.writeFileSync('dist/modflix.json', JSON.stringify(modflix, null, 2));
          "

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
