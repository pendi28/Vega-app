name: Deploy Providers ke GitHub Pages

on:
  push:
    branches: [main, master]
    paths:
      - "providers/**"
      - "manifest.json"
      - "build-bundled.js"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    name: Build & Deploy Providers
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ─────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Setup Node.js ────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"

      # ── 3. Install dependencies ─────────────────────────────────
      - name: Install dependencies
        run: npm ci

      # ── 4. Build providers ──────────────────────────────────────
      - name: Build providers
        run: npm run providers:build

      # ── 5. Deploy ke GitHub Pages ───────────────────────────────
      - name: Deploy ke GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
          keep_files: false
          commit_message: "chore: update providers build [skip ci]"
